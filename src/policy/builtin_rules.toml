# Built-in policy rules — compiled into the tmux-mcp binary.
# Users override by adding rules with negative order in their config.
# All rules here are at order 0 (implicit).

default = "ask"

# --- Circumvention patterns (deny by default, user can override to ask) ---

[[rules]]
description = "eval"
when = 'command.name == "eval"'
action = "deny"
message = "eval executes arbitrary strings"

[[rules]]
description = "source"
when = 'command.name in ["source", "."]'
action = "deny"
message = "source executes file contents"

[[rules]]
description = "exec"
when = 'command.name == "exec"'
action = "deny"
message = "exec replaces the shell process"

[[rules]]
description = "pipe to shell"
when = 'command.name in ["bash","sh","zsh","dash","ksh","csh","tcsh","fish"] && command.is_pipe_target'
action = "deny"
message = "piping to a shell interpreter can execute arbitrary code"

# --- Dangerous commands (ask) ---

[[rules]]
description = "privilege escalation"
when = 'command.name in ["sudo", "su", "doas"]'
action = "ask"

[[rules]]
description = "find dangerous flags"
when = 'command.name == "find" && command.args.exists(a, a in ["-exec", "-execdir", "-delete", "-ok"])'
action = "ask"

[[rules]]
description = "rm recursive"
when = 'command.name == "rm" && has_short_flag(command.args, "r")'
action = "ask"

[[rules]]
description = "git destructive"
when = 'command.name == "git" && command.args.exists(a, a in ["push","reset","clean"]) && (command.args.exists(a, startsWith(a, "--force") || a == "--hard") || has_short_flag(command.args, "f") || has_short_flag(command.args, "D"))'
action = "ask"

[[rules]]
description = "disk and filesystem"
when = 'command.name in ["dd", "mkfs", "fdisk", "mount", "umount"]'
action = "ask"

[[rules]]
description = "system power"
when = 'command.name in ["reboot", "shutdown", "poweroff", "halt"]'
action = "ask"

[[rules]]
description = "process signals"
when = 'command.name in ["kill", "pkill", "killall"]'
action = "ask"

[[rules]]
description = "package removal"
when = 'command.name in ["apt","dnf","pacman","yum"] && command.args.exists(a, a in ["remove","purge","autoremove"])'
action = "ask"

[[rules]]
description = "firewall"
when = 'command.name in ["iptables", "ufw", "firewall-cmd"]'
action = "ask"

[[rules]]
description = "service disruption"
when = 'command.name == "systemctl" && command.args.exists(a, a in ["stop","disable","mask","restart"])'
action = "ask"

[[rules]]
description = "xargs"
when = 'command.name == "xargs"'
action = "ask"

[[rules]]
description = "curl/wget"
when = 'command.name in ["curl", "wget"]'
action = "ask"

[[rules]]
description = "awk code execution"
when = 'command.name in ["awk","gawk","mawk","nawk"] && command.args.exists(a, contains(a, "system"))'
action = "ask"

[[rules]]
description = "chmod"
when = 'command.name == "chmod"'
action = "ask"

[[rules]]
description = "chown"
when = 'command.name == "chown"'
action = "ask"

[[rules]]
description = "cargo install"
when = 'command.name == "cargo" && command.args.exists(a, a == "install")'
action = "ask"
message = "cargo install downloads and compiles arbitrary code from crates.io"

# --- Write redirect protection (runs before safe commands) ---

[[rules]]
description = "write redirect out-of-project"
when = 'command.write_targets.exists(t, !startsWith(path(t), pane.cwd))'
action = "ask"
order = -1
message = "write redirect targets a file outside project directory"

# --- Safe commands (allow) ---

# Noop wrappers — these don't change security context, just scheduling/tracing.
# Only evaluated when has_inner=false (no inner command extracted, e.g. bare "timeout").
# When has_inner=true, these are skipped by the engine.
[[rules]]
description = "noop wrappers"
when = 'command.name in ["timeout","nice","nohup","command","builtin","watch","strace"]'
action = "allow"

# Commands that don't take file paths — unrestricted
[[rules]]
description = "info commands"
when = 'command.name in ["echo","printf","pwd","whoami","hostname","date","uname","id","which","ps","uptime","seq","sleep","true","false","test",":","type","man"]'
action = "allow"

# File-reading tools — contained to project dir
[[rules]]
description = "file readers (in-project)"
when = 'command.name in ["cat","head","tail","less","wc","file","stat","realpath","diff","base64","md5sum","sha256sum"] && !command.args.exists(a, !startsWith(a, "-") && !startsWith(path(a), pane.cwd))'
action = "allow"

[[rules]]
description = "file readers (out-of-project)"
when = 'command.name in ["cat","head","tail","less","wc","file","stat","realpath","diff","base64","md5sum","sha256sum"]'
action = "ask"

# Search/list tools — contained to project dir
[[rules]]
description = "search tools (in-project)"
when = 'command.name in ["ls","grep","rg","find","fd","tree","sort","uniq"] && !command.args.exists(a, !startsWith(a, "-") && !startsWith(path(a), pane.cwd))'
action = "allow"

[[rules]]
description = "search tools (out-of-project)"
when = 'command.name in ["ls","grep","rg","find","fd","tree","sort","uniq"]'
action = "ask"

# File-write tools — contained to project dir
[[rules]]
description = "file ops (in-project)"
when = 'command.name in ["mkdir","cp","mv","touch","ln","rm","chmod","sed","awk","cut","tr","tee"] && !command.args.exists(a, !startsWith(a, "-") && !startsWith(path(a), pane.cwd))'
action = "allow"

[[rules]]
description = "file ops (out-of-project)"
when = 'command.name in ["mkdir","cp","mv","touch","ln","rm","chmod","sed","awk","cut","tr","tee"]'
action = "ask"

# Dev tools — no path restriction (they manage their own paths)
[[rules]]
description = "cargo"
when = 'command.name == "cargo"'
action = "allow"

[[rules]]
description = "git read-only"
when = 'command.name == "git" && command.args.exists(a, a in ["status","log","diff","show","branch","tag","remote","config","ls-files","ls-tree","rev-parse","describe","shortlog","blame","reflog"])'
action = "allow"

[[rules]]
description = "git write"
when = 'command.name == "git"'
action = "ask"
